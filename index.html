<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagnóstico SEO + SOSTAC</title>
</head>
<body>

<!-- Widget autocontenido - No afecta estilos externos -->
<div id="seo-diagnostic-widget"></div>

<script>
(function() {
  'use strict';
  
  // ============================================
  // CONFIGURACIÓN
  // ============================================
  const CONFIG = {
    colors: {
      primary: '#ff2d8d',
      success: '#00ff88',
      warning: '#ffaa00',
      error: '#ff4444'
    },
    whatsapp: '573012963640',
    proxyUrl: 'https://jairoamaya.co/html-proxy.php'
  };

  // ============================================
  // ESTADO
  // ============================================
  let STATE = {
    step: 'input',
    domain: '',
    score: 0,
    baseScore: 0,
    data: {},
    fixes: [],
    usedFixes: [],
    gaps: [],
    signals: {},
    validation: {}
  };

  // ============================================
  // INYECTAR FUENTES
  // ============================================
  const fontLink = document.createElement('link');
  fontLink.href = 'https://fonts.googleapis.com/css2?family=Poppins:wght@900&family=Roboto:wght@400&display=swap';
  fontLink.rel = 'stylesheet';
  document.head.appendChild(fontLink);

  // ============================================
  // CONTENEDOR ROOT
  // ============================================
  const root = document.getElementById('seo-diagnostic-widget');
  root.style.cssText = `
    margin: 0;
    padding: 20px;
    background: #000;
    font-family: 'Roboto', sans-serif;
    min-height: 100vh;
    box-sizing: border-box;
  `;

  // Crear contenedor interno
  const container = document.createElement('div');
  container.id = 'widget-container';
  root.appendChild(container);

  // ============================================
  // FUNCIÓN RENDER
  // ============================================
  function render() {
    console.log('Rendering...', STATE.step);
    
    if(STATE.step === 'input') {
      container.innerHTML = `
        <div style="max-width:600px;margin:80px auto;text-align:center;font-family:'Roboto',sans-serif;">
          <h1 style="color:#fff;font-size:clamp(24px,5vw,36px);font-weight:900;margin-bottom:12px;letter-spacing:-0.5px;font-family:'Poppins',sans-serif;">
            Diagnóstico Técnico de Visibilidad
          </h1>
          <p style="color:#666;font-size:15px;margin-bottom:40px;line-height:1.6;">
            Análisis real sin simulaciones ni datos falsos
          </p>
          <input 
            type="text" 
            id="domain-input" 
            placeholder="tudominio.com"
            style="
              width:100%;
              max-width:500px;
              background:#0d0d0d;
              border:2px solid #1a1a1a;
              padding:18px 24px;
              border-radius:12px;
              color:#fff;
              font-size:16px;
              font-family:'Roboto',sans-serif;
              margin-bottom:16px;
              outline:none;
              box-sizing:border-box;
            "
          />
          <button 
            id="analyze-btn"
            style="
              width:100%;
              max-width:500px;
              background:#fff;
              color:#000;
              border:none;
              padding:18px 32px;
              border-radius:12px;
              font-weight:900;
              font-size:14px;
              font-family:'Poppins',sans-serif;
              text-transform:uppercase;
              letter-spacing:1.5px;
              cursor:pointer;
            "
          >
            Escanear Sitio →
          </button>
        </div>
      `;
      
      // Agregar event listeners
      document.getElementById('analyze-btn').addEventListener('click', () => {
        const domain = document.getElementById('domain-input').value.trim();
        if(domain) runAnalysis(domain);
      });
      
      document.getElementById('domain-input').addEventListener('keydown', (e) => {
        if(e.key === 'Enter') {
          const domain = e.target.value.trim();
          if(domain) runAnalysis(domain);
        }
      });
    }
    
    else if(STATE.step === 'analyzing') {
      container.innerHTML = `
        <div style="max-width:600px;margin:80px auto;text-align:center;">
          <div style="
            width:80px;
            height:80px;
            border:3px solid #1a1a1a;
            border-top-color:${CONFIG.colors.primary};
            border-radius:50%;
            margin:0 auto 24px;
            animation:spin 1s linear infinite;
          "></div>
          <p style="color:#666;font-size:14px;text-transform:uppercase;letter-spacing:2px;font-family:'Poppins',sans-serif;font-weight:900;">
            Analizando ${STATE.domain}...
          </p>
          <style>
            @keyframes spin {
              to { transform: rotate(360deg); }
            }
          </style>
        </div>
      `;
    }
    
    else if(STATE.step === 'results') {
      renderResults();
    }
  }

  // ============================================
  // ANÁLISIS COMPLETO
  // ============================================
  async function runAnalysis(domain) {
    STATE.domain = domain.replace(/^https?:\/\//, '').replace(/\/$/, '');
    STATE.step = 'analyzing';
    render();
    
    try {
      const tStart = performance.now();
      const url = `${CONFIG.proxyUrl}?url=${encodeURIComponent('https://' + STATE.domain)}`;
      const response = await fetch(url);
      const html = await response.text();
      const tEnd = performance.now();
      const latency = (tEnd - tStart) / 1000;
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      
      // Extracción de datos
      const title = doc.querySelector('title')?.textContent || '';
      const titleLen = title.length;
      
      const metaDesc = doc.querySelector('meta[name="description"]')?.getAttribute('content') || '';
      const descLen = metaDesc.length;
      
      const h1s = doc.querySelectorAll('h1');
      const h1Count = h1s.length;
      
      const schemaScripts = doc.querySelectorAll('script[type="application/ld+json"]');
      const hasSchema = schemaScripts.length > 0;
      const schemaTypes = [];
      schemaScripts.forEach(s => {
        try {
          const j = JSON.parse(s.textContent);
          const t = j['@type'] || (Array.isArray(j) ? j.map(x => x['@type']).join(',') : '');
          if(t) schemaTypes.push(t);
        } catch(e) {}
      });
      
      const canonical = doc.querySelector('link[rel="canonical"]');
      const hasCanonical = !!canonical;
      
      const ogTitle = doc.querySelector('meta[property="og:title"]');
      const ogDesc = doc.querySelector('meta[property="og:description"]');
      const ogImage = doc.querySelector('meta[property="og:image"]');
      const ogScore = (ogTitle?1:0) + (ogDesc?1:0) + (ogImage?1:0);
      
      const allImgs = doc.querySelectorAll('img');
      let noAltImgs = 0;
      allImgs.forEach(img => {
        if(!img.getAttribute('alt')) noAltImgs++;
      });
      
      const robotsMeta = doc.querySelector('meta[name="robots"]');
      const robotsContent = robotsMeta?.getAttribute('content')?.toLowerCase() || 'index';
      const isNoindex = robotsContent.includes('noindex');
      
      const bodyText = (doc.body?.innerText || doc.body?.textContent || '')
        .replace(/\s+/g, ' ')
        .trim();
      const words = bodyText.split(/\s+/).filter(w => w.length > 2).length;
      
      // SCORING
      let s = 0;
      const breakdown = [];
      
      let titlePts = 0;
      if(titleLen > 0 && titleLen <= 60) titlePts = 15;
      else if(titleLen > 60 && titleLen <= 75) titlePts = 10;
      else if(titleLen > 0) titlePts = 5;
      s += titlePts;
      breakdown.push({
        label: 'TÍTULO SEO',
        pts: titlePts,
        max: 15,
        note: titleLen === 0 ? 'Sin título' : `${titleLen} caracteres`
      });
      
      let descPts = 0;
      if(descLen >= 120 && descLen <= 160) descPts = 10;
      else if(descLen > 0 && descLen < 120) descPts = 5;
      else if(descLen > 160) descPts = 6;
      s += descPts;
      breakdown.push({
        label: 'META DESCRIPTION',
        pts: descPts,
        max: 10,
        note: descLen === 0 ? 'Ausente' : `${descLen} caracteres`
      });
      
      let h1Pts = h1Count === 1 ? 15 : h1Count === 0 ? 0 : 7;
      s += h1Pts;
      breakdown.push({
        label: 'H1',
        pts: h1Pts,
        max: 15,
        note: h1Count === 0 ? 'AUSENTE' : h1Count === 1 ? 'OK' : `${h1Count} H1 detectados`
      });
      
      let schemaPts = hasSchema ? 20 : 0;
      s += schemaPts;
      breakdown.push({
        label: 'SCHEMA',
        pts: schemaPts,
        max: 20,
        note: hasSchema ? schemaTypes.slice(0,2).join(', ') : 'NO'
      });
      
      let contentPts = words > 800 ? 15 : words > 400 ? 10 : words > 150 ? 5 : 0;
      s += contentPts;
      breakdown.push({
        label: 'CONTENIDO',
        pts: contentPts,
        max: 15,
        note: `${words} palabras`
      });
      
      let latPts = latency < 1.5 ? 10 : latency < 2.5 ? 7 : latency < 4 ? 4 : 0;
      s += latPts;
      breakdown.push({
        label: 'TTFB',
        pts: latPts,
        max: 10,
        note: `${latency.toFixed(2)}s`
      });
      
      let ogPts = ogScore === 3 ? 8 : ogScore === 2 ? 5 : ogScore === 1 ? 2 : 0;
      s += ogPts;
      breakdown.push({
        label: 'OG TAGS',
        pts: ogPts,
        max: 8,
        note: `${ogScore}/3`
      });
      
      let canPts = hasCanonical ? 4 : 0;
      s += canPts;
      breakdown.push({
        label: 'CANONICAL',
        pts: canPts,
        max: 4,
        note: hasCanonical ? 'SÍ' : 'NO'
      });
      
      let altPts = allImgs.length === 0 ? 2 : noAltImgs === 0 ? 3 : noAltImgs <= 2 ? 1 : 0;
      s += altPts;
      breakdown.push({
        label: 'ALT EN IMÁGENES',
        pts: altPts,
        max: 3,
        note: `${noAltImgs} sin alt de ${allImgs.length}`
      });
      
      if(isNoindex) {
        s = Math.max(0, s - 25);
        breakdown.push({
          label: '⚠️ NOINDEX',
          pts: -25,
          max: 0,
          note: 'Penalización'
        });
      }
      
      s = Math.min(100, Math.max(0, Math.round(s)));
      
      // ============================================
      // AI READINESS SCORE (nuevo)
      // ============================================
      let aiScore = 0;
      
      // Schema.org (40 pts - crítico para IA)
      if(hasSchema) aiScore += 40;
      
      // Canonical (10 pts - identidad única)
      if(hasCanonical) aiScore += 10;
      
      // Contenido estructurado (30 pts)
      if(h1Count === 1) aiScore += 10; // Jerarquía clara
      if(words > 400) aiScore += 10; // Densidad informativa
      if(titleLen > 0 && titleLen <= 60) aiScore += 10; // Título bien formado
      
      // Performance (10 pts)
      if(latency < 2) aiScore += 10;
      
      // Open Graph (10 pts - compartibilidad)
      if(ogScore >= 2) aiScore += 10;
      
      aiScore = Math.min(100, Math.max(0, Math.round(aiScore)));
      
      // AI Readiness Tier
      const aiTier = aiScore > 80 ? 'AI-Ready' :
                    aiScore > 60 ? 'Parcialmente Preparado' :
                    aiScore > 40 ? 'Configuración Básica' :
                    'No Preparado para IA';
      
      // AI Warning específico
      let aiWarning = '';
      if(STATE.score > 60 && !hasSchema) {
        aiWarning = '⚠️ Tu sitio puede posicionar en SEO tradicional, pero no está estructurado para ser interpretado por agentes de IA. Sin Schema.org, eres invisible para sistemas como ChatGPT, Perplexity y futuros motores de búsqueda basados en LLMs.';
      } else if(!hasSchema && h1Count !== 1) {
        aiWarning = '🚨 Sin estructura semántica interpretable. Para un LLM, tu sitio es ruido, no una fuente confiable.';
      } else if(hasSchema && aiScore < 60) {
        aiWarning = '⚡ Tienes Schema.org pero la implementación está incompleta. Los agentes de IA pueden verte, pero no confiar plenamente en tus datos.';
      } else if(aiScore > 80) {
        aiWarning = '✅ Tu sitio está preparado para ser citado por agentes de IA. Tienes soberanía semántica.';
      }
      
      // ============================================
      // VISIBILITY LAYERS SYSTEM (Gamificación)
      // ============================================
      const executabilityScore = 0; // Placeholder - se implementaría con WebMCP detection
      const sovereigntyScore = 0;   // Placeholder - se implementaría con llms.txt detection
      
      STATE.visibilityLayers = {
        technical: {
          name: 'Visibilidad Técnica',
          score: s,
          unlocked: true,
          progress: s,
          icon: '🎯',
          description: 'SEO tradicional y optimización básica',
          nextRequirement: null
        },
        ai_citability: {
          name: 'Citabilidad IA',
          score: aiScore,
          unlocked: s > 50,
          progress: aiScore,
          icon: '🤖',
          description: 'Interpretabilidad por agentes de IA y LLMs',
          nextRequirement: s <= 50 ? 'Alcanza 50+ en Visibilidad Técnica' : null
        },
        executability: {
          name: 'Ejecutabilidad',
          score: executabilityScore,
          unlocked: aiScore > 70,
          progress: executabilityScore,
          icon: '⚡',
          description: 'WebMCP, API endpoints y acciones ejecutables',
          nextRequirement: aiScore <= 70 ? 'Alcanza 70+ en Citabilidad IA' : null,
          comingSoon: true
        },
        sovereignty: {
          name: 'Soberanía Semántica',
          score: sovereigntyScore,
          unlocked: executabilityScore > 80,
          progress: sovereigntyScore,
          icon: '👑',
          description: 'Control total de tu representación en sistemas de IA',
          nextRequirement: 'Completa Ejecutabilidad',
          comingSoon: true
        }
      };
      
      // FIXES
      const fixes = [];
      if(!hasSchema) fixes.push({
        label: 'Implementar Schema.org / Grafos de Confianza',
        gain: 20
      });
      if(h1Count !== 1) fixes.push({
        label: h1Count === 0 
          ? 'Agregar H1 único con keyword principal'
          : 'Consolidar múltiples H1 en jerarquía correcta',
        gain: 15
      });
      if(descLen < 120 || descLen === 0) fixes.push({
        label: 'Optimizar meta description (120-160 chars)',
        gain: 10
      });
      if(titleLen === 0 || titleLen > 75) fixes.push({
        label: 'Corregir título SEO (30-60 chars)',
        gain: 10
      });
      if(ogScore < 3) fixes.push({
        label: 'Completar Open Graph para redes sociales',
        gain: 8
      });
      if(!hasCanonical) fixes.push({
        label: 'Configurar URL canonical',
        gain: 4
      });
      if(noAltImgs > 0) fixes.push({
        label: `Agregar alt text a ${noAltImgs} imágenes`,
        gain: 3
      });
      if(words < 400) fixes.push({
        label: 'Ampliar contenido (mínimo 600 palabras)',
        gain: 10
      });
      if(latency >= 2.5) fixes.push({
        label: 'Optimizar velocidad del servidor (TTFB)',
        gain: 6
      });
      
      const topFixes = fixes.sort((a,b) => b.gain - a.gain).slice(0,3);
      
      // INSIGHT
      let insight = '';
      if(!hasSchema && h1Count !== 1) {
        insight = 'Tu sitio no tiene estructura semántica interpretable. Para un LLM, eres ruido, no una fuente.';
      } else if(words < 300) {
        insight = 'Tu problema no es SEO. Es ausencia de densidad informativa suficiente para competir.';
      } else if(isNoindex) {
        insight = 'Tienes NOINDEX activo. Google literalmente no puede indexarte. Esto no es optimización, es bloqueo autoinfligido.';
      } else if(latency > 2.5) {
        insight = 'Tu cuello de botella no es contenido. Es infraestructura: estás llegando tarde a cada respuesta.';
      } else if(!hasSchema && words > 600) {
        insight = 'Tienes contenido, pero sin marcado estructurado. Los agentes de IA no pueden extraer datos verificables.';
      } else if(h1Count === 0) {
        insight = 'Sin H1 no hay jerarquía semántica. Tu página es un bloque de texto sin arquitectura interpretable.';
      } else if(h1Count > 1 && hasSchema) {
        insight = 'Schema implementado pero jerarquía rota (múltiples H1). Estás enviando señales contradictorias.';
      } else if(ogScore < 2 && hasSchema) {
        insight = 'Tienes Schema pero no Open Graph. Invisible en redes sociales mientras optimizas para bots.';
      } else {
        insight = 'Tu sitio tiene base técnica, pero no está optimizado para citabilidad por IA ni soberanía semántica.';
      }
      
      // Generar gaps para SOSTAC
      STATE.gaps = [];
      if(!hasSchema) STATE.gaps.push({titulo: 'Sin Schema.org', desc: 'Faltan datos estructurados', impacto: 'critical'});
      if(h1Count !== 1) STATE.gaps.push({titulo: 'Jerarquía H1 incorrecta', desc: h1Count === 0 ? 'Sin H1' : 'Múltiples H1', impacto: 'high'});
      if(descLen < 120) STATE.gaps.push({titulo: 'Meta Description', desc: 'Ausente o muy corta', impacto: 'high'});
      if(titleLen === 0 || titleLen > 75) STATE.gaps.push({titulo: 'Title SEO', desc: 'Ausente o muy largo', impacto: 'high'});
      if(latency > 2.5) STATE.gaps.push({titulo: 'TTFB Alto', desc: 'Servidor lento', impacto: 'critical'});
      if(ogScore < 3) STATE.gaps.push({titulo: 'Open Graph incompleto', desc: 'Faltan tags sociales', impacto: 'medium'});
      if(!hasCanonical) STATE.gaps.push({titulo: 'Sin Canonical', desc: 'Falta URL canónica', impacto: 'medium'});
      if(words < 400) STATE.gaps.push({titulo: 'Contenido insuficiente', desc: 'Menos de 400 palabras', impacto: 'high'});
      
      STATE.score = s;
      STATE.baseScore = s;
      STATE.aiScore = aiScore;
      STATE.aiTier = aiTier;
      STATE.aiWarning = aiWarning;
      STATE.data = {
        breakdown,
        latency: latency.toFixed(2),
        h1Count,
        hasSchema,
        hasCanonical,
        ogScore,
        words,
        isNoindex,
        insight
      };
      STATE.fixes = topFixes;
      STATE.usedFixes = [];
      STATE.signals = { html5_semantic: true };
      STATE.validation = { schema_usable: hasSchema ? 'executes' : 'missing' };
      STATE.step = 'results';
      render();
      
    } catch(error) {
      console.error('Error:', error);
      alert('Error al analizar el sitio. Verifica el dominio.');
      STATE.step = 'input';
      render();
    }
  }

  function applyFix(index) {
    if(STATE.usedFixes.includes(index)) return;
    STATE.usedFixes.push(index);
    STATE.score = Math.min(100, STATE.score + STATE.fixes[index].gain);
    render();
  }

  // ============================================
  // RENDER RESULTADOS COMPLETO
  // ============================================
  function renderResults() {
    const statusColor = STATE.score > 80 ? CONFIG.colors.success : 
                       STATE.score > 50 ? CONFIG.colors.warning : 
                       CONFIG.colors.error;
    const statusLabel = STATE.score > 80 ? 'SALUDABLE' :
                       STATE.score > 50 ? 'RIESGO MODERADO' :
                       'VISIBILIDAD CRÍTICA';
    const semaphore = STATE.score > 80 ? 'green' :
                     STATE.score > 50 ? 'yellow' :
                     'red';
    
    // Métricas en grid 3x2
    const metrics = STATE.data.breakdown.slice(0,6).map(m => {
      const status = m.pts === m.max ? 'ok' 
                   : m.pts > m.max * 0.6 ? 'warn'
                   : 'bad';
      
      const statusColor = status === 'ok' ? CONFIG.colors.success
                        : status === 'warn' ? CONFIG.colors.warning
                        : CONFIG.colors.error;
      
      const value = m.label === 'H1' ? (m.note === 'OK' ? 'OK' : m.note)
                  : m.label === 'SCHEMA' ? m.note
                  : m.label === 'CANONICAL' ? m.note
                  : m.label === 'OG TAGS' ? m.note
                  : m.label === 'TTFB' ? m.note
                  : m.note;
      
      return `
        <div style="
          background:#0d0d0d;
          border:1px solid #1a1a1a;
          border-radius:12px;
          padding:20px;
          text-align:center;
        ">
          <div style="
            font-size:10px;
            color:#555;
            text-transform:uppercase;
            letter-spacing:1.5px;
            margin-bottom:12px;
            font-weight:900;
            font-family:'Poppins',sans-serif;
          ">${m.label}</div>
          <div style="
            font-size:18px;
            color:${statusColor};
            font-weight:900;
            font-family:'Poppins',sans-serif;
          ">${value}</div>
        </div>
      `;
    }).join('');
    
    // Score potencial
    const potentialScore = Math.min(100, STATE.score + STATE.fixes.reduce((sum, f) => sum + (STATE.usedFixes.includes(STATE.fixes.indexOf(f)) ? 0 : f.gain), 0));
    
    // Plan de intervención
    const interventions = STATE.fixes.map((fix, i) => {
      const used = STATE.usedFixes.includes(i);
      return `
        <div id="fix-${i}" style="
          background:#0d0d0d;
          border:1px solid #1a1a1a;
          border-radius:10px;
          padding:16px 20px;
          margin-bottom:12px;
          display:flex;
          justify-content:space-between;
          align-items:center;
          cursor:${used ? 'not-allowed' : 'pointer'};
          opacity:${used ? '0.3' : '1'};
          transition:background 0.2s;
        ">
          <span style="color:#ccc;font-size:13px;line-height:1.5;">${fix.label}</span>
          <span style="
            background:${used ? '#0a0a0a' : 'linear-gradient(135deg,' + CONFIG.colors.success + ' 0%, #00cc66 100%)'};
            color:${used ? '#333' : '#000'};
            padding:6px 12px;
            border-radius:6px;
            font-size:11px;
            font-weight:900;
            font-family:'Poppins',sans-serif;
            min-width:60px;
            text-align:center;
          ">${used ? '✓ HECHO' : '+' + fix.gain}</span>
        </div>
      `;
    }).join('');
    
    container.innerHTML = `
      <div style="max-width:1400px;margin:40px auto;font-family:'Roboto',sans-serif;">
        
        <!-- ============================================ -->
        <!-- CAPA 1: SEO TRADICIONAL (Entregable core)   -->
        <!-- ============================================ -->
        
        <!-- Score SEO Principal -->
        <div style="
          background:#0d0d0d;
          border:2px solid ${CONFIG.colors.primary};
          border-radius:16px;
          padding:40px;
          text-align:center;
          margin-bottom:40px;
        ">
          <div style="
            font-size:11px;
            color:#555;
            text-transform:uppercase;
            letter-spacing:2px;
            margin-bottom:16px;
            font-weight:900;
            font-family:'Poppins',sans-serif;
          ">VISIBILITY SCORE SEO</div>
          
          <div style="display:flex;justify-content:center;align-items:center;gap:40px;margin-bottom:24px;">
            <!-- Score -->
            <div>
              <div style="
                font-size:clamp(80px,12vw,120px);
                font-weight:900;
                font-family:'Poppins',sans-serif;
                background:linear-gradient(135deg,${CONFIG.colors.primary} 0%,#ff006e 100%);
                -webkit-background-clip:text;
                -webkit-text-fill-color:transparent;
                line-height:1;
              ">${STATE.score}<span style="
                  font-size:0.3em;
                  color:#333;
                  font-weight:400;
                ">/100</span>
              </div>
            </div>
            
            <!-- Semáforo -->
            <div style="
              display:flex;
              flex-direction:column;
              gap:14px;
            ">
              <div style="
                width:32px;
                height:32px;
                border-radius:50%;
                background:${semaphore === 'red' ? CONFIG.colors.error : '#1a1a1a'};
                box-shadow:${semaphore === 'red' ? `0 0 20px ${CONFIG.colors.error}aa` : 'none'};
              "></div>
              <div style="
                width:32px;

      let layer, subtasks, recursos, criterios, esfuerzo, responsable;
      
      // TTFB / Performance
      if(gap.titulo.includes('TTFB') || gap.titulo.includes('servidor')) {
        layer = 'infrastructure';
        esfuerzo = 'alto';
        responsable = 'dev';
        subtasks = [
          'Auditar tiempo de respuesta actual',
          'Implementar CDN (Cloudflare/Fastly)',
          'Optimizar consultas de base de datos',
          'Configurar compresión GZIP/Brotli',
          'Validar TTFB < 1.5s en PageSpeed'
        ];
        recursos = [
          'https://web.dev/ttfb/',
          'https://www.cloudflare.com/cdn/'
        ];
        criterios = [
          'TTFB medido < 1.5s en 3 pruebas consecutivas',
          'Score PageSpeed > 90 en mobile'
        ];
      }
      
      // Schema.org
      else if(gap.titulo.includes('Schema')) {
        layer = 'semantic';
        esfuerzo = 'medio';
        responsable = 'dev';
        subtasks = [
          'Identificar tipos de Schema relevantes (Organization, WebPage, Product)',
          'Generar JSON-LD para Organization',
          'Generar JSON-LD para WebPage con potentialAction',
          'Agregar breadcrumbs Schema',
          'Validar en Google Rich Results Test',
          'Validar en Schema.org validator'
        ];
        recursos = [
          'https://schema.org/Organization',
          'https://schema.org/WebPage',
          'https://search.google.com/test/rich-results'
        ];
        criterios = [
          'Schema Organization detectado y validado',
          'potentialAction ejecutable presente',
          'Sin errores en Rich Results Test'
        ];
      }
      
      // H1
      else if(gap.titulo.includes('H1') || gap.titulo.includes('Jerarquía')) {
        layer = 'structure';
        esfuerzo = 'bajo';
        responsable = 'content';
        const isZero = gap.desc.includes('Sin H1');
        subtasks = isZero ? [
          'Identificar keyword principal de la página',
          'Redactar H1 único con keyword',
          'Implementar H1 en HTML',
          'Validar jerarquía H1 > H2 > H3'
        ] : [
          'Auditar todos los H1 actuales',
          'Consolidar en H1 único',
          'Redistribuir contenido a H2/H3',
          'Validar jerarquía semántica'
        ];
        recursos = [
          'https://moz.com/learn/seo/on-page-factors'
        ];
        criterios = [
          'Exactamente 1 H1 por página',
          'Jerarquía h1 > h2 > h3 respetada'
        ];
      }
      
      // Meta Description
      else if(gap.titulo.includes('Meta Description') || gap.titulo.includes('description')) {
        layer = 'structure';
        esfuerzo = 'bajo';
        responsable = 'content';
        subtasks = [
          'Redactar meta description (120-160 chars)',
          'Incluir keyword principal',
          'Agregar call-to-action',
          'Implementar en HTML',
          'Validar en SERP preview'
        ];
        recursos = [
          'https://moz.com/learn/seo/meta-description'
        ];
        criterios = [
          'Meta description entre 120-160 caracteres',
          'Incluye keyword principal',
          'Preview en SERP sin truncamiento'
        ];
      }
      
      // Title SEO
      else if(gap.titulo.includes('Title') || gap.titulo.includes('título')) {
        layer = 'structure';
        esfuerzo = 'bajo';
        responsable = 'content';
        subtasks = [
          'Redactar title tag (30-60 chars)',
          'Incluir keyword principal al inicio',
          'Agregar marca al final (| Marca)',
          'Implementar en HTML',
          'Validar en SERP preview'
        ];
        recursos = [
          'https://moz.com/learn/seo/title-tag'
        ];
        criterios = [
          'Title entre 30-60 caracteres',
          'Keyword principal en primeros 30 chars',
          'Sin truncamiento en SERP'
        ];
      }
      
      // Canonical
      else if(gap.titulo.includes('Canonical')) {
        layer = 'structure';
        esfuerzo = 'bajo';
        responsable = 'dev';
        subtasks = [
          'Identificar URL canónica para cada página',
          'Implementar <link rel="canonical">',
          'Validar canonical self-referencing',
          'Verificar en Google Search Console'
        ];
        recursos = [
          'https://developers.google.com/search/docs/crawling-indexing/canonicalization'
        ];
        criterios = [
          'Canonical tag presente en todas las páginas',
          'Sin canonical chains',
          'Validado en GSC'
        ];
      }
      
      // Open Graph
      else if(gap.titulo.includes('Open Graph') || gap.titulo.includes('OG')) {
        layer = 'distribution';
        esfuerzo = 'bajo';
        responsable = 'dev';
        subtasks = [
          'Agregar og:title',
          'Agregar og:description',
          'Agregar og:image (1200x630px)',
          'Agregar og:url',
          'Validar en Facebook Debugger'
        ];
        recursos = [
          'https://ogp.me/',
          'https://developers.facebook.com/tools/debug/'
        ];
        criterios = [
          'Mínimo 3 tags OG presentes',
          'og:image > 1200x630px',
          'Preview correcto en redes sociales'
        ];
      }
      
      // Contenido
      else if(gap.titulo.includes('Contenido') || gap.titulo.includes('palabras')) {
        layer = 'structure';
        esfuerzo = 'alto';
        responsable = 'content';
        subtasks = [
          'Expandir contenido a mínimo 600 palabras',
          'Agregar secciones con H2/H3',
          'Incluir keywords secundarias',
          'Agregar internal links',
          'Validar densidad de keywords < 2%'
        ];
        recursos = [
          'https://moz.com/learn/seo/content'
        ];
        criterios = [
          'Contenido > 600 palabras',
          'Estructura H2/H3 clara',
          'Keyword density 0.5-2%'
        ];
      }
      
      // Default para gaps no mapeados
      else {
        layer = 'structure';
        esfuerzo = 'medio';
        responsable = 'dev';
        subtasks = [gap.desc];
        recursos = [];
        criterios = ['Gap resuelto y validado'];
      }
      
      // Calcular prioridad numérica (impacto × esfuerzo inverso × capa)
      const impactoNum = gap.impacto === 'critical' ? 10 : gap.impacto === 'high' ? 7 : gap.impacto === 'medium' ? 4 : 2;
      const esfuerzoNum = esfuerzo === 'bajo' ? 3 : esfuerzo === 'medio' ? 2 : 1;
      const priorityScore = impactoNum * esfuerzoNum * (5 - layerPriority[layer]);
      
      const task = {
        id: `task_${String(taskId).padStart(3, '0')}`,
        gap: gap.titulo,
        phase: 'TACTICS',
        layer: layer,
        accion: `Implementar: ${gap.titulo}`,
        impacto: gap.impacto,
        esfuerzo: esfuerzo,
        prioridad: gap.impacto === 'critical' ? 0 : gap.impacto === 'high' ? 1 : 2,
        priorityScore: priorityScore,
        isBlocker: gap.impacto === 'critical',
        responsable: responsable,
        estado: 'pending',
        subtasks: subtasks,
        dependencias: [],
        timeline: null, // Se calcula después
        recursos: recursos,
        criteriosAceptacion: criterios,
        gananciaScore: calculateGainFromGap(gap)
      };
      
      tasks.push(task);
      taskId++;
    });
    
    // ============================================
    // CALCULAR DEPENDENCIAS INTELIGENTES
    // ============================================
    tasks.forEach(task => {
      // Regla: infraestructura bloquea todo
      if(task.layer !== 'infrastructure') {
        const infraTasks = tasks.filter(t => t.layer === 'infrastructure');
        task.dependencias = infraTasks.map(t => t.id);
      }
      
      // Regla: estructura antes que semántica
      if(task.layer === 'semantic') {
        const structureTasks = tasks.filter(t => t.layer === 'structure');
        task.dependencias = [...new Set([...task.dependencias, ...structureTasks.map(t => t.id)])];
      }
      
      // Regla: semántica antes que distribución
      if(task.layer === 'distribution') {
        const semanticTasks = tasks.filter(t => t.layer === 'semantic');
        task.dependencias = [...new Set([...task.dependencias, ...semanticTasks.map(t => t.id)])];
      }
    });
    
    // ============================================
    // GENERAR ROADMAP CON PARALELIZACIÓN
    // ============================================
    const sortedTasks = tasks.sort((a, b) => b.priorityScore - a.priorityScore);
    let currentWeek = 1;
    const roadmap = [];
    const completedTasks = new Set();
    
    while(sortedTasks.some(t => !completedTasks.has(t.id))) {
      const availableTasks = sortedTasks.filter(t => {
        if(completedTasks.has(t.id)) return false;
        return t.dependencias.every(dep => completedTasks.has(dep));
      });
      
      if(availableTasks.length === 0) break; // Evitar loop infinito
      
      // Capacidad por semana (ajustable)
      const weekCapacity = 3;
      const weekTasks = availableTasks.slice(0, weekCapacity);
      
      roadmap.push({
        semana: currentWeek,
        tasks: weekTasks.map(t => t.id),
        scoreEstimado: STATE.baseScore + Array.from(completedTasks).reduce((sum, id) => {
          const task = tasks.find(t => t.id === id);
          return sum + (task?.gananciaScore || 0);
        }, 0) + weekTasks.reduce((sum, t) => sum + t.gananciaScore, 0),
        blockers: weekTasks.filter(t => t.isBlocker).map(t => t.accion)
      });
      
      weekTasks.forEach(t => {
        t.timeline = { semana: currentWeek, duracion: t.esfuerzo === 'bajo' ? '1-2 días' : t.esfuerzo === 'medio' ? '3-5 días' : '1-2 semanas' };
        completedTasks.add(t.id);
      });
      
      currentWeek++;
    }
    
    return {
      situation: [
        { completed: true, title: 'Análisis Técnico Completado', note: `Score SEO: ${STATE.baseScore}/100, AI Readiness: ${STATE.aiScore}/100` },
        { completed: true, title: 'Gaps Identificados', note: `${STATE.gaps.length} problemas detectados` },
        { completed: STATE.aiScore > 60, title: 'Preparación IA', note: STATE.aiTier }
      ],
      objectives: [
        { completed: false, title: `Alcanzar Score SEO ${Math.min(100, STATE.baseScore + 30)}/100`, note: `Incremento proyectado: +${Math.min(100, STATE.baseScore + 30) - STATE.baseScore} pts` },
        { completed: false, title: 'AI-Ready Status', note: 'Implementar Schema.org + estructura semántica completa' },
        { completed: false, title: 'Soberanía Semántica', note: 'Citabilidad verificable por agentes de IA' }
      ],
      strategy: [
        { completed: false, title: 'Infraestructura Primero', note: 'Performance y servidor antes que contenido' },
        { completed: false, title: 'Estructura Semántica Sólida', note: 'HTML bien formado + jerarquía clara' },
        { completed: false, title: 'Datos Estructurados Verificables', note: 'Schema.org como fundación para IA' }
      ],
      tactics: tasks,
      action: roadmap,
      control: [
        { completed: false, title: 'Tracking Semanal de Score', note: 'Re-análisis cada 7 días' },
        { completed: false, title: 'Validación de Criterios', note: 'Verificar cada task contra criterios de aceptación' },
        { completed: false, title: 'Dashboard de Progreso', note: 'Monitoreo visual del roadmap' }
      ]
    };
  }
  
  function calculateGainFromGap(gap) {
    // Mapeo aproximado de gap a ganancia de score
    if(gap.titulo.includes('Schema')) return 20;
    if(gap.titulo.includes('H1')) return 15;
    if(gap.titulo.includes('TTFB')) return 10;
    if(gap.titulo.includes('Meta Description')) return 10;
    if(gap.titulo.includes('Title')) return 10;
    if(gap.titulo.includes('OG')) return 8;
    if(gap.titulo.includes('Canonical')) return 4;
    if(gap.titulo.includes('Contenido')) return 10;
    return 5;
  }
  
  // ============================================
  // REDIRECT TO SOSTAC FLOW

  function redirectToSOSTACFlow() {
    if(STATE.step !== 'results') {
      alert('Primero debes realizar un análisis');
      return;
    }
    
    // Generar datos SOSTAC si no existen
    if(!SOSTAC_DATA || Object.keys(SOSTAC_DATA).length === 0) {
      SOSTAC_DATA = generateSOSTACFromAnalysis();
    }
    
    // Crear payload
    const payload = {
      source: 'ejecuta.seo',
      domain: STATE.domain,
      analyzedAt: new Date().toISOString(),
      seoScore: STATE.score,
      aiScore: STATE.aiScore,
      sostacData: SOSTAC_DATA
    };
    
    // Codificar en base64
    const encoded = btoa(JSON.stringify(payload));
    
    // Redirect a SOSTAC Flow
    window.location.href = `https://sostacflow.jairoamaya.co/importar?payload=${encoded}`;
  }
